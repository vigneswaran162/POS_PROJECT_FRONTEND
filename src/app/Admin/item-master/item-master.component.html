<div class="container" style="height: 85vh;">
    <div class="row d-flex align-items-center justify-content-center">
        <div class="col-md-10 p-5 box">
            <h5 class="mb-4"><i class="bi bi-clipboard-check" data-bs-toggle="modal" data-bs-target="#staticBackdrop" ></i> ITEM <span>MASTER</span> </h5>
            <div class="row ">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="FormControlInput1" class="form-label">Item Code</label>
                        <input type="text" class="form-control" id="FormControlInput1" [(ngModel)]="model.ItemCode">
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="FormControlInput2" class="form-label">Item Name</label>
                        <input type="text" class="form-control" id="FormControlInput2" [(ngModel)]="model.ItemName">
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="FormControlInput2" class="form-label">Rate</label>
                        <input type="text" class="form-control" id="FormControlInput2" [(ngModel)]="model.Rate">
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="FormControlInput2" class="form-label">UOM</label>
                        <input type="text" class="form-control" id="FormControlInput2" [(ngModel)]="model.UOM">
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="FormControlInput2" class="form-label">Category</label>
                        <select class="form-select" [(ngModel)]="model.Category" aria-label="Default select example">
                            <option value="MainDish">Main Dish</option>
                            <option value="SideDsih">Side Dsih</option>
                            <option value="Snacks">Snacks</option>
                            <option value="Desserts">Desserts</option>
                           
                        </select>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="FormControlInput2" class="form-label">Sub Category</label>
                        <select [(ngModel)]="model.ItemType" class="form-select" aria-label="Default select example">
                            <option value="Veg">Veg</option>
                            <option value="Non Veg">Non Veg</option>
                            <option value="Others">Others</option>
                        </select>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="formFile" class="form-label">Image</label>
                        <input class="form-control" type="file" (change)="displayImage($event)" [(ngModel)]="model.ItemImage"  id="formFile">
                    </div>
                </div>
                <div class="col-md-6">
                <div class="mb-3">
                        <label for="FormControlInput21" class="form-label">OpeningStock</label>
                        <input type="text" minlength="1" maxlength="3" class="form-control" id="FormControlInput21" [(ngModel)]="model.OpeningStock"   pattern="^[0-9]+$"
                       (blur)="validateOpeningStock()">
                    </div>
                </div>
                 <div class="col-md-6">

                </div>
                <div class="col-md-6 mt-4 d-flex align-items-center justify-content-end">
                      <button class="button-clear mx-2" (click)="onClear()">Clear</button>
                     <button class="button" (click)="onSubmit()">Submit</button>
                </div>

            </div>
        </div>
    </div>
</div>
