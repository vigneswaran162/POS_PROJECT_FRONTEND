<div class="container">
    <div class="row">
        <div class="col-md-12">

        </div>
        <div class="col-md-12 gird">
            <div class="gird-box">
                <h2 class="mb-3">Revenue</h2>
                <div  class="d-flex">
                 <div>
                <i class="bi bi-graph-up-arrow"></i>
                 </div>
                 <h3>{{totalrevenue}}</h3>
                </div>
            </div>
            <div class="gird-box">
                <h2 class="mb-3">Delivery</h2>
                <div class="d-flex">
               <div >
                     <i class="bi bi-cart3"></i>
               </div>
                    <h3>{{ orderCounts['Delivery'] }}</h3>
                </div>
            </div>
            <div class="gird-box">
                <h2 class="mb-3">Dine In</h2>
                <div class="d-flex">
                    <div>
                                      <i class="bi bi-shop-window"></i>
                    </div>
                    <h3>{{ orderCounts['Dine In'] }}</h3>
                </div>
            </div>
            <div class="gird-box">
                <h2 class="mb-3">Take Away</h2>
                <div class="d-flex">
                     <div>            <i class="bi bi-basket"></i></div>
                     <h3>{{ orderCounts['Take Away'] }}</h3>
                </div>
            </div>
        </div>
        <div class="col-md-6 mx-2 p-2 pie-chart mt-4">
                    <h2 class="my-2 text-center ">Last 7 Days Sales</h2>
<div id="salesBarChart" style="width: 100%; height: 350px;"></div>
        </div>
        <div class="col-md-5 p-2 pie-chart mt-4">
        <h2 class="my-2 text-center ">Revenue by Order Type</h2>
            <div id="orderTypeRevenueChart" style="height:350px;width:100%;"></div>
        </div>
        <div class="col-md-12 my-2">
            <h2 class="top-selling-food">Top Selling Dishes</h2>
        </div>
           <div class="col-md-12 gird">

            <div class="gird-box" *ngFor="let item of TopSellingFoods;">
                <div  class="d-flex">
                 <div style="width: 30%;">
                 <img [src]="item.ItemImage" class="img-fluid sm-img" alt="">
                 </div>
                 <div  style="width: 70%;" class="mt-3">
                <h3 class="top-itemname">{{item._id.ItemName}}</h3>
                 <h6 class="mx-3 text-muted">Orders:{{item.totalQtySold}}</h6>
                 </div>
                </div>
            </div>
           
           
        </div>
    </div>
</div>

<div *ngIf="isLoading" class="loader-wrapper">
<div class="three-body">
<div class="three-body__dot"></div>
<div class="three-body__dot"></div>
<div class="three-body__dot"></div>
</div>

</div>
