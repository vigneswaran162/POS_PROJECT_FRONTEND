<div class="container" style="height: 85vh;">
    <div class="row d-flex align-items-center justify-content-center">
        <div class="col-md-12 p-5 box">
            <h5 class="mb-4"><i class="bi bi-clipboard-check" data-bs-toggle="modal" data-bs-target="#staticBackdrop" ></i> SALES <span>REPORT</span> </h5>
            <div class="row">
              <div class="col-md-12 d-flex align-items-center justify-content-start mb-3">
<div class="mb-3 mx-4" style="width: 20%;">
  <label for="exampleFormControlInput1" class="form-label">From Date</label>
  <input type="date" class="form-control" id="exampleFormControlInput1" [(ngModel)]="fromDate">
</div>
<div class="mb-3" style="width: 20%;">
  <label for="exampleFormControlInput1" class="form-label">To Date</label>
  <input type="date" class="form-control" id="exampleFormControlInput1" [(ngModel)]="toDate">
</div>
              </div>
              <div class="col-md-12 d-flex align-items-center justify-content-end">
                <button class="button-clear" (click)="onclear()">Clear</button>
                <button class="button mx-2" (click)="onsubmit()">Generate Report</button>
              </div>

              <div class="col-md-12" *ngIf="paginatedData.length > 0">

                    <div class="col-md-4 my-3">
      <input type="text"
             class="form-control"
             placeholder="Search ..."
             [(ngModel)]="searchText"
             (input)="onSearch()">
    </div>
                  <!-- 📊 Table -->
  <table class="table table-bordered table-striped mt-3">
    <thead class="table-dark">
      <tr>
       <th>Order No</th>
      <th>Date</th>
      <th>Order Type</th>
      <th>Payment</th>
      <th>Items Count</th>
      <th>Amount</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let item of paginatedData">
       <td>{{ item.OrderNo }}</td>
      <td>{{ item.OrderDate | date:'dd-MM-yyyy' }}</td>
      <td>{{ item.OrderType }}</td>
      <td>{{ item.PaymentType }}</td>
      <td>{{ item.ItemCount }}</td>
      <td>{{ item.TotalAmount }}</td>
      </tr>
    </tbody>
  </table>

  <!-- 📄 Pagination -->
  <nav class="d-flex align-items-center justify-content-between">
    <ul class="pagination">

      <li class="page-item" [class.disabled]="currentPage === 1">
        <button class="page-link" (click)="changePage(currentPage - 1)">
          Prev
        </button>
      </li>

      <li class="page-item"
          *ngFor="let page of [].constructor(totalPages); let i = index"
          [class.active]="currentPage === i + 1">
        <button class="page-link" (click)="changePage(i + 1)">
          {{ i + 1 }}
        </button>
      </li>

      <li class="page-item" [class.disabled]="currentPage === totalPages">
        <button class="page-link" (click)="changePage(currentPage + 1)">
          Next
        </button>
      </li>

    </ul>
     <button class="button-excel" (click)="exportToExcel()">Export Excel</button>
  </nav>
              </div>

            </div>
        </div>

    </div>
</div>
